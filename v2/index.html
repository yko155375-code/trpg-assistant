<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRPG Assistant v2</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2307111f'/%3E%3Ccircle cx='32' cy='32' r='18' fill='%23c7a45d'/%3E%3Ctext x='32' y='39' font-size='22' text-anchor='middle' fill='%2307111f'%3EV2%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css?v=black-screen-storage-boot-fix-20260607-02" />
    <link rel="stylesheet" href="./team-card.css?v=black-screen-storage-boot-fix-20260607-02" />
    <link rel="stylesheet" href="./team-status-lookup.css?v=black-screen-storage-boot-fix-20260607-02" />
    <link rel="stylesheet" href="./dice.css?v=black-screen-storage-boot-fix-20260607-02" />
    <script>
      window.__TRPG_V2_BOOT_ERRORS__ = [];
      window.addEventListener("error", function (event) {
        window.__TRPG_V2_BOOT_ERRORS__.push(event.message || "unknown error");
      });
      window.addEventListener("unhandledrejection", function (event) {
        window.__TRPG_V2_BOOT_ERRORS__.push(String(event.reason && (event.reason.message || event.reason) || "unhandled rejection"));
      });
      window.setTimeout(function () {
        var app = document.getElementById("app");
        if (!app || app.children.length) return;
        app.innerHTML = '<section style="padding:18px;border:1px solid rgba(214,181,112,.35);border-radius:16px;background:#101a27;color:#f3ead8;font-family:system-ui, sans-serif"><p style="margin:0 0 8px;color:#c7a45d">TRPG Assistant v2 啟動保護</p><h1 style="margin:0 0 12px;font-size:24px">頁面沒有成功啟動</h1><p style="line-height:1.7">這代表主程式在你的瀏覽器被阻擋或執行失敗。請先按下方按鈕清除 v2 本機資料後重開。</p><button id="trpg-v2-reset-storage" style="min-height:42px;border:1px solid #c7a45d;border-radius:10px;background:rgba(199,164,93,.18);color:#fff8e8;padding:0 14px">清除 v2 本機資料並重開</button><pre style="white-space:pre-wrap;margin-top:12px;color:#b9ad9a;font-size:12px">' + (window.__TRPG_V2_BOOT_ERRORS__ || []).join('\n') + '</pre></section>';
        var button = document.getElementById("trpg-v2-reset-storage");
        if (button) {
          button.addEventListener("click", function () {
            try { window.localStorage.removeItem("trpg-assistant-v2-state"); } catch (error) {}
            window.location.href = "./?v=black-screen-storage-boot-fix-20260607-02-reset";
          });
        }
      }, 1800);
    </script>
  </head>
  <body>
    <noscript>本工具需要啟用 JavaScript。</noscript>
    <div id="app" class="app-shell" aria-live="polite"></div>
    <script type="module" src="./app.js?v=black-screen-storage-boot-fix-20260607-02"></script>
    <script type="module" src="./modules/team-status-lookup.js?v=black-screen-storage-boot-fix-20260607-02"></script>
    <script type="module" src="./modules/version.js?v=black-screen-storage-boot-fix-20260607-02"></script>
  </body>
</html>
